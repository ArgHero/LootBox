<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
  <!-- Fuentes -->
  <title>Registro</title>
</head>

<body>

  <!-- navbar -->
  <div id="navbar-container"></div>
  <div id="main-container"></div>
  <main class="container">

    <div class="col-12 col-md-6 mb-4 d-flex flex-column justify-content-center align-items-center">
      <aside>
      <div class="container px-4 px-md-8">
        <div class="row justify-content-center">
          <form class="w-100 p-3">
            <div class="alert alert-danger fade show" style="display:none;"
            role="alert" id="alertValidaciones">
            <p id="alertValidacionesTexto"></p>
            </div>
       
              <legend> Registro </legend>
              <div class="mb-3">
                <label for="txtNombre" class="form-label"> Nombre y Apellido</label>
                <input type="text" id="txtNombre" class="form-control"  autofocus placeholder="Ingresa tu nombre" name="nombre">
              </div>
              <div class="mb-3">
                <label for="txtCorreo" class="form-label"> Correo Electrónico </label>
                <input type="email" id="txtCorreo" class="form-control" placeholder="Ingresa tu correo electrónico" name="email">
              </div>
              <div class="mb-3">
                <label for="txtTel" class="form-label"> Teléfono </label>
                <input type="tel" id="txtTel" class="form-control" placeholder="Ingresa tu teléfono" name="telefono" maxlength="10">
              </div>

              <div class="mb-3" id="txtReglas">
                a
              </div> 

              <div class="mb-3">
                  <label for="txtContraseña"> Contraseña</label>
                  <input type="text" id="txtContraseña" class="form-control"  autofocus placeholder="Contraseña" name="contraseña">
              </div>
              <div class="mb-3">
                <label for="txtConfirmar"> Confirmar contraseña</label>
                <input type="text" id="txtConfirmar" class="form-control"  autofocus placeholder="Confirmar contraseña" name="confirmar">
              </div>

              <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="chkTerminos">
                <label class="form-check-label" for="chkTerminos">Aceptar <a href="#">Términos y condiciones</a></label>
              </div>

            <button type="submit" class="btn btn-primary" id="btnEnviar"> Enviar </button>
           
          </form>
      </div>
    </aside></div>
  </div>

  </main>



  <div id="footer-container"></div>
  
  <script src="./scripts/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq"
    crossorigin="anonymous"></script>
  <script type="module" src="./scripts/loader.js"></script>
</body>

</html>
