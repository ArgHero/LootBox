<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous" />
    <!--Fuentes-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <link
      href="https://fonts.googleapis.com/css2?family=Alumni+Sans+Collegiate+One:ital@0;1&family=Galindo&family=Irish+Grover&display=swap"
      href="https://fonts.google.com/specimen/Irish+Grover?query=iris+grover" rel="stylesheet" />
   
    <title> Publicar </title>
    <link rel="stylesheet" href="./styles/styles.css">
    <link rel="icon" type="image/png" href="./assets/icons/favicon-lootbox.png">
</head>

<body>
      <!-- navbar -->
    <div id="navbar-container"></div>

    <div id="main-container">
    <form class="container mt-4" >
        <fieldset disabled>
            <legend>Creación / Edición de productos</legend>         
            <div class="row mb-3">
                <div class="col-md-4">
                        <label for="disabledInput1" class="form-label">SKU</label>
                        <input type="text" class="form-control" placeholder="SKU">
                </div>
                <div class="col-md-8 mb-3">
                    <label for="disabledSelect" class="form-label">Categoría</label>
                        <select class="form-select">
                            <option>Selecciona la categoría</option> 
                        </select>
                </div> 
                <div class="mb-3">
                    <label for="disabledInput2" class="form-label">Producto</label>
                    <input type="text" class="form-control" placeholder="Nombre del producto">
                </div>
            </div>  
            <div class="mb-3">
                <label for="disabledTextInput"  class="form-label">Descripción del producto</label>
                <textarea class="form-control" rows="4" placeholder="Escribe aquí..."></textarea>          
            </div>
          <div class="row mb-3">
                <div class="col-md-4">
                <label for="disabledInput1" class="form-label">Precio</label>
                <input type="text" class="form-control" placeholder="$00.00">
        </div>
         <div class="col-md-4">
                <label for="disabledInput2" class="form-label">Costo</label>
                <input type="text" class="form-control" placeholder="$00.00">
                </div>
          <div class="col-md-4">
            <label for="disabledInput2" class="form-label">Cantidad</label>
            <input type="text" class="form-control" placeholder="0">
            </div>
        </div>
          <button type="submit" class="btn btn-primary">Publicar</button>
        </fieldset>
      </form> <br>

    <!-- Tabla -->
    <table class="container table table-striped">
        <tr class="table-primary">
            <th class="table-primary" style="width:10%;">SKU</th>
            <th class="table-primary" style="width:50%;">Producto</th>
            <th class="table-primary">precio</th>
            <th class="table-primary">Cantidad</th>
            <th class="table-primary"></th>
        </tr>
        <tr class="table-dark">
            <td class="table-dark">...</td>
            <td class="table-dark">...</td>
            <td class="table-dark">...</td>
            <td class="">...</td>
            <td class="d-flex justify-content-end">
                <button type="button" class="btn btn-warning me-3">Editar</button>
                <button type="button" class="btn btn-danger">Eliminar</button>
            </td>
        </tr>
    </table>
</div>
</div>

    <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./scripts/loader.js"></script>
</body>

</html>
