<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous" />
    <!--Fuentes-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <link
      href="https://fonts.googleapis.com/css2?family=Alumni+Sans+Collegiate+One:ital@0;1&family=Galindo&family=Irish+Grover&display=swap"
      href="https://fonts.google.com/specimen/Irish+Grover?query=iris+grover" rel="stylesheet" />
   
    <title> Publicar </title>
    <link rel="stylesheet" href="./styles/styles.css">
    <link rel="icon" type="image/png" href="./assets/icons/favicon-lootbox.png">
</head>

<body>
      <!-- navbar -->
    <div id="navbar-container"></div>

    <div id="main-container">
    <form class="container mt-4" >
        <fieldset>
            <legend>Creación / Edición de productos</legend>         
            <div class="row mb-3">
                <div class="col-md-4">
                        <label for="Input" class="form-label">SKU</label>
                        <span id="sku-alert-container"></span>
                        <input type="text" class="form-control" placeholder="SKU" id="sku" minlength="1" maxlength="4">
                </div>
                <div class="col-md-8 mb-3">
                    <label for="Select" class="form-label">Categoría</label>
                    <span id="categoria-alert-container"></span>
                        <select class="form-select" id="selector-categoria">
                            <option selected disabled hidden value="">Selecciona la categoría</option>
                            <option value="Consolas">Consolas</option>
                            <option value="Merch">Merch</option>
                            <option value="Periféricos">Periféricos</option>
                            <option value="Videojuegos">Videojuegos</option>
                        </select>
                </div> 
                <div class="mb-3">
                    <label for="Input" class="form-label">Producto</label>
                    <span id="producto-alert-container"></span>
                    <input type="text" class="form-control" placeholder="Nombre del producto" id="producto" required>
                </div>
                
            </div>  
          <div class="mb-3">
              <label for="TextInput"  class="form-label">Descripción del producto</label>
              <span id="descripcion-alert-container"></span>
              <textarea class="form-control" rows="4" placeholder="Escribe aquí..." id="descripcion" required></textarea>          
          </div>
          <div class="row mb-3">
            <div class="col-md-4">
            <label for="Input" class="form-label">Precio</label>
            <span id="precio-alert-container"></span>
            <input type="text" class="form-control" placeholder="$00" id="precio" required>
          </div>
          <div class="col-md-4">
            <label for="Input" class="form-label">Costo</label>
            <span id="costo-alert-container"></span>
            <input type="text" class="form-control" placeholder="$00" id="costo" required>
          </div>
          <div class="col-md-4">
            <label for="Input" class="form-label">Cantidad</label>
            <span id="cantidad-alert-container"></span>
            <input type="text" class="form-control" placeholder="0" id="cantidad" required>
          </div>

          <div class="mb-3 mt-3">
            <label for="fileUpload" class="form-label">Cargar la imágen del producto</label>
            <div class="d-flex justify-content-around align-items-center  p-3 rounded-3 bg-white shadow text-dark">
              
              <span class="spinner-border text-secondary visually-hidden" role="status"></span>
              <input type="file" id="fileUpload" accept="image/*" >
            </div>
            
          </div>

          <div class="mb-3 mt-3">
            <img id="output" src="" alt="">
          </div>

            <!-- <div class="mb-3 mt-3">
              <label for="url-imagen" class="form-label">URL de la imagen del producto</label>
              <span id="URL-alert-container"></span>
              <input type="url" class="form-control" id="url-imagen" placeholder="https://ejemplo.com/imagen.jpg" required>
          </div> -->
         

        </div>

          <button type="submit" class="btn btn-primary" id="btn-publicar">Publicar</button>
        </fieldset>
      </form> <br>

<!-- Tabla -->
    <table class="container table table-striped" id="tabla-items" >
      <thead class="w-100">
        <th class="table-primary d-none d-md-table-cell"></th>
        <th class="table-primary">SKU</th>
        <th class="table-primary">Producto</th>
        <th class="table-primary d-none d-md-table-cell">Categoría</th>
        <th class="table-primary d-none d-md-table-cell">Precio</th> <!-- Agregado d-none d-md-table-cell -->
        <th class="table-primary d-none d-md-table-cell">Cantidad</th> <!-- Agregado d-none d-md-table-cell -->
        <th class="table-primary"></th>

      </thead>
        <tbody>

        </tbody>
    </table>
</div>
</div>
    <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  
  <script type="module" src="./scripts/loader.js"></script>
  <script src="./scripts/publicar.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
